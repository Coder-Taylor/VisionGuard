# 生产环境一键部署：后端 + 全部中间件
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-visionhub}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-visionhub}
      POSTGRES_DB: ${DB_NAME:-visionhub}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - visionguard_pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    restart: always

  backend:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - postgres
      - redis
    restart: always

volumes:
  visionguard_pgdata:
    external: true
  uploads_data:

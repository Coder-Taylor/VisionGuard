# 生产环境一键部署：后端 + 全部中间件
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-visionhub}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-visionhub}
      POSTGRES_DB: ${DB_NAME:-visionhub}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

  backend:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    restart: always

volumes:
  pgdata:
